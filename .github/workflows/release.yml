name: release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout tag with full history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.ref_name }}

      - name: Resolve previous tag
        id: prev_tag
        run: |
          set -euo pipefail
          # Exclude the tag that triggered this run, list everything before it.
          prev="$(git tag --list 'v*' --sort=-v:refname | grep -vFx '${{ github.ref_name }}' | head -n 1 || true)"
          echo "tag=${prev}" >> "$GITHUB_OUTPUT"

      - name: Validate version.json matches tag
        id: validate
        run: |
          set -euo pipefail
          tag_version="${GITHUB_REF_NAME#v}"
          if [[ ! "${tag_version}" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Tag '${GITHUB_REF_NAME}' is not a valid vX.Y.Z tag"
            exit 1
          fi
          echo "version=${tag_version}" >> "$GITHUB_OUTPUT"

      - name: Generate changelog
        id: changelog
        env:
          PREV_TAG: ${{ steps.prev_tag.outputs.tag }}
        run: |
          set -euo pipefail
          from_ref="${PREV_TAG:-$(git rev-list --max-parents=0 HEAD)}"
          node .github/scripts/generate-changelog.mjs "${from_ref}" "${GITHUB_REF_NAME}" > changelog.txt
          cat changelog.txt

      - name: Build release archive
        env:
          VERSION: ${{ steps.validate.outputs.version }}
        run: |
          set -euo pipefail

          staging="$(mktemp -d)"
          archive_root="${staging}/mnr_api"
          mkdir -p "${archive_root}"

          # Copy the full tracked tree, then strip anything matched by .releaseignore.
          git archive --format=tar "${GITHUB_REF_NAME}" | tar -x -C "${archive_root}"

          if [ -f .releaseignore ]; then
            while IFS= read -r pattern; do
              # Skip blank lines and comments.
              [[ -z "${pattern}" || "${pattern}" =~ ^# ]] && continue
              find "${archive_root}" -path "${archive_root}/${pattern}" -prune -exec rm -rf {} +
            done < .releaseignore
          fi

          zip_name="mnr_api-v${VERSION}.zip"
          (cd "${staging}" && zip -r -X -q "${GITHUB_WORKSPACE}/${zip_name}" "mnr_api")

          echo "ZIP_NAME=${zip_name}" >> "$GITHUB_ENV"

      - name: Update version.json on main
        env:
          VERSION: ${{ steps.validate.outputs.version }}
        run: |
          set -euo pipefail

          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'

          git fetch origin main
          git checkout main
          git pull --ff-only origin main

          node -e "
            const fs = require('fs');
            const path = 'version.json';
            const data = JSON.parse(fs.readFileSync(path, 'utf8'));
            data.version = process.env.VERSION;
            fs.writeFileSync(path, JSON.stringify(data, null, 4) + '\n');
          "

          if git diff --quiet -- version.json; then
            echo "version.json already up to date, skipping commit."
          else
            git add version.json
            git commit -m "chore(release): update version.json to v${VERSION} [skip ci]"
            git push origin main
          fi

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          gh release create "${GITHUB_REF_NAME}" \
            "${ZIP_NAME}" \
            --title "${GITHUB_REF_NAME}" \
            --notes-file changelog.txt