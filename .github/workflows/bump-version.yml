name: bump-version

on:
  push:
    branches:
      - main

concurrency:
  group: bump-version-main
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  bump:
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout full history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve previous bump commit
        id: prev_bump
        run: |
          set -euo pipefail
          # The range for this run starts right after the last bump commit we
          # made (minor/patch OR major), NOT the last tag. minor/patch bumps
          # never tag, so using "last tag" here would re-count commits that
          # were already consumed by an earlier untagged bump.
          sha="$(git log --grep='^chore(bump):' --format='%H' -n 1 || true)"
          echo "sha=${sha}" >> "$GITHUB_OUTPUT"

      - name: Read current version from fxmanifest.lua
        id: current_version
        run: |
          set -euo pipefail
          version="$(grep -oP "(?<=^version ')[0-9]+\.[0-9]+\.[0-9]+(?=')" fxmanifest.lua)"
          if [ -z "${version}" ]; then
            echo "::error::Could not parse version from fxmanifest.lua"
            exit 1
          fi
          echo "version=${version}" >> "$GITHUB_OUTPUT"

      - name: Compute bump
        id: compute
        env:
          PREV_BUMP_SHA: ${{ steps.prev_bump.outputs.sha }}
          CURRENT_VERSION: ${{ steps.current_version.outputs.version }}
        run: |
          set -euo pipefail
          from_ref="${PREV_BUMP_SHA:-$(git rev-list --max-parents=0 HEAD)}"
          result="$(node .github/scripts/compute-bump.mjs "${from_ref}" "HEAD" "${CURRENT_VERSION}")"
          bump="$(node -e "process.stdout.write(JSON.parse(process.argv[1]).bump)" "${result}")"
          version="$(node -e "process.stdout.write(JSON.parse(process.argv[1]).version)" "${result}")"
          should_tag="$(node -e "process.stdout.write(String(JSON.parse(process.argv[1]).shouldTag))" "${result}")"
          echo "bump=${bump}" >> "$GITHUB_OUTPUT"
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "should_tag=${should_tag}" >> "$GITHUB_OUTPUT"

      - name: Update fxmanifest.lua
        if: steps.compute.outputs.bump != 'none'
        env:
          NEW_VERSION: ${{ steps.compute.outputs.version }}
        run: |
          set -euo pipefail
          sed -i "s/^version '[0-9]\+\.[0-9]\+\.[0-9]\+'/version '${NEW_VERSION}'/" fxmanifest.lua
          grep -q "version '${NEW_VERSION}'" fxmanifest.lua || {
            echo "::error::Failed to update fxmanifest.lua with new version"
            exit 1
          }

      - name: Commit version bump
        if: steps.compute.outputs.bump != 'none'
        env:
          NEW_VERSION: ${{ steps.compute.outputs.version }}
          BUMP_LEVEL: ${{ steps.compute.outputs.bump }}
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add fxmanifest.lua
          git commit -m "chore(bump): v${NEW_VERSION} (${BUMP_LEVEL}) [skip ci]"
          git push origin main

      - name: Tag major release
        if: steps.compute.outputs.should_tag == 'true'
        env:
          NEW_VERSION: ${{ steps.compute.outputs.version }}
        run: |
          set -euo pipefail
          git tag -a "v${NEW_VERSION}" -m "v${NEW_VERSION}"
          git push origin "v${NEW_VERSION}"

      - name: Summary
        run: |
          {
            echo "### bump-version"
            echo ""
            if [ "${{ steps.compute.outputs.bump }}" = "none" ]; then
              echo "No qualifying commits (feat/fix/perf) found since last bump. Nothing to do."
            else
              echo "Bump: **${{ steps.compute.outputs.bump }}**"
              echo "New version: **${{ steps.compute.outputs.version }}**"
              if [ "${{ steps.compute.outputs.should_tag }}" = "true" ]; then
                echo "Tag pushed: \`v${{ steps.compute.outputs.version }}\` — release workflow will run."
              else
                echo "No tag created (not a breaking change) — fxmanifest.lua updated only."
              fi
            fi
          } >> "$GITHUB_STEP_SUMMARY"